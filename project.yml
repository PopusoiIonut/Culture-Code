name: CultureCode
targets:
  CultureCode:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: YES
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        DEVELOPMENT_TEAM: M9NL4PJ9AL
        PRODUCT_BUNDLE_IDENTIFIER: com.popusoiionut.CultureCode
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ACCENT_COLOR_NAME: AccentColor
schemes:
  CultureCode:
    build:
      targets:
        CultureCode: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
